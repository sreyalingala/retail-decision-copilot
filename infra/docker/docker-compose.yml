services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: retail_decision_copilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - rdc_postgres_data:/var/lib/postgresql/data

  # Optional app services (run backend/frontend from workspace by default):
  # api:
  #   build: ../../apps/api
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     - DATABASE_URL=...
  #
  # web:
  #   build: ../../apps/web
  #   ports:
  #     - "3000:3000"

volumes:
  rdc_postgres_data:

