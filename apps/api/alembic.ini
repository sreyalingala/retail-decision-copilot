[alembic]
script_location = migrations
prepend_sys_path = .

sqlalchemy.url = %(DATABASE_URL)s

[loggers]
keys = root,sqlalchemy,alembic
level = WARN
handlers =
qualname = %(qualname)s

[handlers]
keys = console
qualname = console
class = StreamHandler
args = (sys.stderr,)

[formatters]
keys = generic
qualname = generic
format = %(levelname)-5.5s [%(name)s] %(message)s

